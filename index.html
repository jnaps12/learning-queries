<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/main.css">
  <link rel="stylesheet" href="./style/home/login.css">
  <link rel="stylesheet" href="./style/footer.css">
  <title>Learning Queries</title>
</head>
<body>
  <header>
      <div class="logo">
        <img class="logo-img" src="./imgs/icon-sql.svg" alt="Logo do learning queries" width="50px">
        <span class="logo-texto">Learning Queries</span>
      </div>

      <div class="actions">
        <a class="button" href="./sign-up.html">Cadastre-se</a>
      </div>
  </header>

  <div class="container">
    <section class="login">
      <div class="logo-login">
        <img class="login-img" src="./imgs/icon-sql.svg" alt="Logo do learning queries" width="250px">
        <span class="texto-4rem">Learning Queries</span>
      </div>

      <div class="form-login">
        <p class="login-title">Login</p>
        <label for="email">Email</label> <br>
        <input class="field" type="email" name="email" id="email">

        <br>

        <label for="senha">Senha</label> <br>
        <input class="field" type="password" name="password" id="password">
        <br>

        <a id="button-entrar" href="./logged-1.html">Entrar</a>
        <a id="button-cadastrar" href="./sign-up.html">Cadastre-se</a>
      </div>
    </section>
  </div>

  <footer>
    Developed by Junior Pinheiro, 2022.
  </footer>
</body>
</html>
